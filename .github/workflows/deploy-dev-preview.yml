name: Deploy Dev Preview

on:
  push:
    branches:
      - claude/quiz-cloud-dev-setup-fy56a2

jobs:
  deploy_preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Deploy to Firebase Hosting preview channel (dev)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_WATASHIHADARE_QUIZ }}'
          projectId: watashihadare-quiz
          channelId: dev
          expires: 30d
